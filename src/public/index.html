<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Morning Brief - Your AI News Call</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0A0A0A;
      --text-color: #E5E5E5;
      --accent-color: #F5A623;
      --ai-bubble-bg: #1A1A1A;
      --user-bubble-bg: #F5A623;
      --user-text-color: #0A0A0A;
      --input-bg: #1A1A1A;
      --border-color: #2A2A2A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grain/noise background */
    body::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      z-index: 10;
      position: relative;
      height: 100%;
    }

    .progress-container {
      display: flex;
      gap: 6px;
      padding: 24px 20px 12px;
      width: 100%;
    }
    .progress-segment {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background-color: #222;
      transition: background-color 0.4s ease;
    }
    .progress-segment.active {
      background-color: var(--accent-color);
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: none;
      padding-bottom: 40px;
    }
    .chat-container::-webkit-scrollbar {
      display: none;
    }

    .ai-message-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      max-width: 90%;
      align-self: flex-start;
      opacity: 0;
      transform: translateY(10px);
      animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--accent-color);
      flex-shrink: 0;
      margin-bottom: 12px;
      box-shadow: 0 0 10px rgba(245, 166, 35, 0.3);
    }
    .avatar.pulse {
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 5px rgba(245, 166, 35, 0.2); }
      100% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 15px rgba(245, 166, 35, 0.7); }
    }

    .message-bubble {
      background-color: var(--ai-bubble-bg);
      padding: 14px 18px;
      border-radius: 20px 20px 20px 4px;
      font-size: 16px;
      line-height: 1.45;
      border: 1px solid var(--border-color);
      color: #F3F3F3;
    }
    
    .message-bubble strong {
      font-weight: 500;
      color: var(--accent-color);
    }

    .user-message-row {
      align-self: flex-end;
      max-width: 85%;
      opacity: 0;
      transform: translateY(10px);
      animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .user-bubble {
      background-color: var(--user-bubble-bg);
      color: var(--user-text-color);
      padding: 14px 18px;
      border-radius: 20px 20px 4px 20px;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.45;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 16px 20px;
      background-color: var(--ai-bubble-bg);
      border-radius: 20px 20px 20px 4px;
      border: 1px solid var(--border-color);
      width: fit-content;
      align-items: center;
      height: 51px;
    }
    .typing-dot {
      width: 6px;
      height: 6px;
      background-color: #888;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .input-area {
      padding: 10px 20px 24px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: linear-gradient(180deg, rgba(10,10,10,0) 0%, rgba(10,10,10,1) 30%);
    }

    .input-container {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      width: 100%;
    }
    .input-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .buttons-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 16px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
      width: 100%;
    }
    .btn:hover {
      background-color: #222;
    }
    .btn.primary {
      background-color: var(--accent-color);
      color: #0A0A0A;
      border-color: var(--accent-color);
      font-weight: 600;
    }
    .btn.primary:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(245, 166, 35, 0.25);
    }

    .text-form {
      position: relative;
      display: flex;
      align-items: center;
    }
    .text-input {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 18px 56px 18px 24px;
      border-radius: 28px;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .text-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 1px var(--accent-color);
    }
    .submit-arrow {
      position: absolute;
      right: 8px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--accent-color);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #0A0A0A;
      transition: transform 0.2s, background-color 0.2s;
    }
    .submit-arrow:hover {
      transform: scale(1.05);
    }
    .submit-arrow:disabled {
      background-color: #555;
      cursor: not-allowed;
      transform: none;
    }
    .submit-arrow svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .topics-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .topic-pill {
      padding: 12px 18px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .topic-pill.selected {
      background-color: rgba(245, 166, 35, 0.15);
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    .skip-link {
      display: block;
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-top: 16px;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.2s;
    }
    .skip-link:hover { color: #ccc; }

    .time-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-bottom: 10px;
    }
    .time-pill {
      flex-grow: 1;
      text-align: center;
      padding: 14px 0;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      min-width: calc(33.333% - 10px);
    }
    .time-pill:hover, .time-pill.selected {
      background-color: var(--accent-color);
      color: #0A0A0A;
      border-color: var(--accent-color);
    }

    /* FINALE CSS - REBUILT */
    .finale-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0A0A0A; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden; opacity: 0; transition: opacity 1s ease;
      pointer-events: none;
    }
    .finale-overlay.visible { opacity: 1; pointer-events: auto; }
    .info-spark {
      position: absolute; color: #F5A623; font-family: 'DM Sans', sans-serif;
      font-size: 14px; opacity: 0; pointer-events: none; white-space: nowrap;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .info-spark.explode { animation: sparkExplode 2s ease-out forwards; }
    .info-spark.converge { animation: sparkConverge 1.5s ease-in forwards; }
    
    @keyframes sparkExplode {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      40% { opacity: 1; }
      100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.5); opacity: 0.3; }
    }
    @keyframes sparkConverge {
      0% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.5); opacity: 0.3; }
      80% { opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    }
    .orb-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 200px; height: 200px; display: flex; align-items: center; justify-content: center;
    }
    .central-orb {
      width: 80px; height: 80px; background: #F5A623; border-radius: 50%;
      transform: scale(0); opacity: 0; box-shadow: 0 0 0px #F5A623;
    }
    .central-orb.appear {
      animation: orbAppear 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, orbPulse 3s ease-in-out infinite 1s;
    }
    @keyframes orbAppear {
      0% { transform: scale(0); opacity: 0; box-shadow: 0 0 0px #F5A623; }
      60% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 60px #F5A623; }
      100% { transform: scale(1); opacity: 1; box-shadow: 0 0 30px #F5A623; }
    }
    @keyframes orbPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px #F5A623; }
      50% { transform: scale(1.05); box-shadow: 0 0 50px #F5A623; }
    }
    @media (max-width: 480px) { .central-orb { width: 60px; height: 60px; } }
    .sonar-ring {
      position: absolute; border: 1px solid #F5A623; border-radius: 50%;
      width: 80px; height: 80px; opacity: 0; top: 50%; left: 50%; margin-left: -40px; margin-top: -40px;
    }
    .sonar-ring.active { animation: sonarPulse 2.4s infinite linear; }
    .sonar-ring:nth-child(2) { animation-delay: 0.8s; }
    .sonar-ring:nth-child(3) { animation-delay: 1.6s; }
    @keyframes sonarPulse {
      0% { transform: scale(1); opacity: 0.4; border-color: #F5A623; }
      100% { transform: scale(3); opacity: 0; border-color: #F5A623; }
    }
    .orbiting-dot {
      position: absolute; width: 3px; height: 3px; background: #F5A623; border-radius: 50%;
      top: 50%; left: 50%; margin-top: -1.5px; margin-left: -1.5px; opacity: 0;
    }
    .orbiting-dot.active { animation: orbit var(--dur) infinite linear; opacity: var(--op); }
    @keyframes orbit {
      0% { transform: rotate(0deg) translateX(var(--dist)) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(var(--dist)) rotate(-360deg); }
    }
    .finale-text-area {
      position: absolute; top: 60%; width: 100%; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .finale-label {
      font-size: 16px; color: #F5A623; opacity: 0; transition: opacity 1s; margin-bottom: 20px; font-weight: 500;
    }
    .typewriter-line {
      color: #F3F3F3; line-height: 1.6; margin: 0; font-size: 17px; min-height: 27px;
    }
    .typewriter-line.line-1 { font-size: 20px; min-height: 32px; font-weight: 500; }
    .finale-cta {
      opacity: 0; transition: opacity 1s; margin-top: 30px;
      display: flex; flex-direction: column; align-items: center; gap: 16px; pointer-events: none;
    }
    .finale-cta.visible { opacity: 1; pointer-events: auto; }
    .share-btn {
      border: 1px solid rgba(245, 166, 35, 0.5); background: transparent; color: #F5A623;
      padding: 12px 28px; border-radius: 30px; font-size: 14px; cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .share-btn:hover { background: rgba(245, 166, 35, 0.1); }
    .linkedin-link {
      color: #F5A623; font-size: 13px; opacity: 0.5; text-decoration: none; transition: opacity 0.2s;
    }
    .linkedin-link:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="progress-container"></div>
    <div class="chat-container" id="chat-container"></div>
    <div class="input-area" id="input-area"></div>
  </div>



  <script>
    const chatContainer = document.getElementById('chat-container');
    const inputArea = document.getElementById('input-area');
    
    let userData = {
      name: '', role: '', city: '', topics: [], specific_flags: '', phone: '', email: '', call_time: '', consent: true
    };

    const flow = {
      intro: {
        progress: 1,
        messages: [
          "Hey there. 👋",
          "I'm your Morning Brief — an AI that calls you every morning with news tailored to your world.",
          "But first, I need to get to know you. This'll take 2 minutes."
        ],
        input: () => `
          <div class="buttons-group">
            <button class="btn primary" onclick="handleChoice('name', 'Let\\'s do it')">Let's do it</button>
            <button class="btn" onclick="handleChoice('more_info', 'Tell me more first')">Tell me more first</button>
          </div>
        `
      },
      more_info: {
        progress: 1,
        messages: [
          "Fair enough. Here's how it works &rarr;",
          "Every morning, at a time you choose, your phone rings. It's me.",
          "I give you a 3-minute briefing — personalized to your work, your city, your interests.",
          "You can interrupt, ask follow-ups, go deeper on anything.",
          "No app. No newsletter. Just a voice call.",
          "Ready now?"
        ],
        input: () => `<button class="btn primary" onclick="handleChoice('name', 'I\\'m in')">I'm in</button>`
      },
      name: {
        progress: 2,
        messages: ["Let's start simple. What should I call you?"],
        input: () => createTextInput('name', 'Your name', 'text')
      },
      role: {
        progress: 3,
        messages: () => [
          `<strong>${userData.name}</strong> — nice to meet you. 🤝`,
          "What do you do? This helps me frame every story around your world."
        ],
        input: () => createTextInput('role', 'e.g. Product manager at a fintech startup', 'text')
      },
      city: {
        progress: 4,
        messages: [
          "Interesting. I'll keep that in mind.",
          "Which city are you in? I'll weave in local news that actually matters to you."
        ],
        input: () => createTextInput('city', 'Your city', 'text')
      },
      topics: {
        progress: 5,
        messages: () => [
          `<strong>${userData.city}</strong> — noted. 📍`,
          "Now the fun part. What should I track for you?",
          "Pick as many as you want."
        ],
        input: () => {
          const topicsList = ['Tech & AI', 'Startup funding', 'Business news', 'Finance & markets', 'D2C & e-commerce', 'Politics', 'Sports', 'Local/city news'];
          let html = '<div class="topics-grid">';
          topicsList.forEach(t => {
            html += `<div class="topic-pill" onclick="toggleTopic(this, '${t}')">${t}</div>`;
          });
          html += `</div><button class="btn primary" id="topics-btn" style="display: none;" onclick="submitTopics()">Continue &rarr;</button>`;
          return html;
        }
      },
      specific: {
        progress: 6,
        messages: [
          "Great picks.",
          "Anything hyper-specific? A company you're watching, a person you follow, a trend you're tracking?",
          "This is where it gets really personal."
        ],
        input: () => `
          ${createTextInput('specific_flags', 'e.g. Zepto, Elon Musk, EV market...', 'text', false)}
          <div class="skip-link" onclick="handleChoice('phone', 'Nothing specific — surprise me', true)">Nothing specific — surprise me</div>
        `
      },
      phone: {
        progress: 7,
        messages: [
          "Almost there.",
          "I need your phone number — this is how I'll reach you every morning.",
          "No spam, no messages. Just your daily call."
        ],
        input: () => createTextInput('phone', '+91 XXXXX XXXXX', 'tel')
      },
      email: {
        progress: 8,
        messages: ["And an email — just for your account."],
        input: () => createTextInput('email', 'you@example.com', 'email')
      },
      time: {
        progress: 9,
        messages: () => [
          `Last question, <strong>${userData.name}</strong>.`,
          "When should I call you? Pick your ideal morning slot."
        ],
        input: () => {
          const times = ['7:00 AM', '7:30 AM', '8:00 AM', '8:30 AM', '9:00 AM', '9:30 AM', '10:00 AM'];
          let html = '<div class="time-selector">';
          times.forEach(t => {
            const dbTime = formatTime(t);
            html += `<div class="time-pill" onclick="selectTime('${t}', '${dbTime}')">${t}</div>`;
          });
          html += '</div>';
          return html;
        }
      },
      submit: {
        progress: 10,
        messages: [],
        input: () => ''
      }
    };

    function formatTime(display) {
      const parts = display.split(' ');
      let [hours, mins] = parts[0].split(':');
      if (parts[1] === 'PM' && hours !== '12') hours = parseInt(hours) + 12;
      if (parts[1] === 'AM' && hours === '12') hours = '00';
      return `${hours.toString().padStart(2, '0')}:${mins}`;
    }

    function formatDisplayTime(dbTime) {
      if (!dbTime) return '';
      let [hours, mins] = dbTime.split(':');
      hours = parseInt(hours);
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      return `${hours}:${mins} ${ampm}`;
    }

    function createTextInput(field, placeholder, type = 'text', required = true) {
      return `
        <form class="text-form" onsubmit="handleTextInput(event, '${field}')">
          <input type="${type}" id="input-${field}" class="text-input" placeholder="${placeholder}" ${required ? 'required' : ''} autocomplete="off">
          <button type="submit" class="submit-arrow" id="btn-${field}">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </button>
        </form>
      `;
    }

    const sleep = ms => new Promise(res => setTimeout(res, ms));

    function scrollToBottom() {
      chatContainer.scrollTo({
        top: chatContainer.scrollHeight,
        behavior: 'smooth'
      });
    }

    function updateProgress(num) {
      document.querySelectorAll('.progress-segment').forEach((el, index) => {
        if (index < num) el.classList.add('active');
      });
    }

    function addUserMessage(text) {
      const row = document.createElement('div');
      row.className = 'user-message-row';
      row.innerHTML = `<div class="user-bubble">${text}</div>`;
      chatContainer.appendChild(row);
      scrollToBottom();
    }

    async function runStep(stepId) {
      const step = flow[stepId];
      updateProgress(step.progress);
      
      inputArea.innerHTML = '';
      
      const messages = typeof step.messages === 'function' ? step.messages() : step.messages;
      
      for (let i = 0; i < messages.length; i++) {
        const row = document.createElement('div');
        row.className = 'ai-message-row';
        row.innerHTML = `
          <div class="avatar pulse"></div>
          <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        `;
        chatContainer.appendChild(row);
        scrollToBottom();
        
        await sleep(700 + Math.random() * 200);
        
        row.innerHTML = `
          <div class="avatar"></div>
          <div class="message-bubble">${messages[i]}</div>
        `;
        scrollToBottom();
        
        if (i < messages.length - 1) {
          await sleep(400);
        }
      }
      
      const inputHtml = step.input();
      if (inputHtml) {
        inputArea.innerHTML = `<div class="input-container">${inputHtml}</div>`;
        inputArea.offsetHeight; // trigger reflow
        inputArea.querySelector('.input-container').classList.add('visible');
        
        const inputField = inputArea.querySelector('input');
        if (inputField) {
          setTimeout(() => inputField.focus(), 100);
          
          if (stepId === 'phone') {
            inputField.addEventListener('input', (e) => {
              const btn = document.getElementById('btn-phone');
              let cleaned = e.target.value.replace(/[\s-]/g, '').replace(/^0+/, '');
              let digitsOnly = cleaned.replace(/^\+/, '');
              if (e.target.value.length > 0 && !/^\d{10,12}$/.test(digitsOnly)) {
                btn.style.opacity = '0.5';
              } else {
                btn.style.opacity = '1';
                e.target.style.borderColor = 'var(--border-color)';
              }
            });
          }
        }
      }

      if (stepId === 'submit') {
        submitData();
        startFinale();
        return;
      }
    }

    window.handleChoice = async (nextStep, text, isSkip = false) => {
      inputArea.innerHTML = '';
      addUserMessage(text);
      if (isSkip) userData.specific_flags = '';
      await sleep(400);
      runStep(nextStep);
    };

    window.handleTextInput = async (e, field) => {
      e.preventDefault();
      const input = document.getElementById(`input-${field}`);
      let val = input.value.trim();
      
      if (field !== 'specific_flags' && !val) return;
      
      if (field === 'phone') {
        let cleaned = val.replace(/[\s-]/g, '').replace(/^0+/, '');
        let digitsOnly = cleaned.replace(/^\+/, '');
        
        if (!/^\d{10,12}$/.test(digitsOnly)) {
          input.value = '';
          input.placeholder = 'Try format: 98765 43210';
          input.style.borderColor = '#ff4444';
          return;
        }
        
        if (digitsOnly.length === 10) {
          val = '+91' + digitsOnly;
        } else if (!cleaned.startsWith('+')) {
          val = '+' + digitsOnly;
        } else {
          val = cleaned;
        }
      }
      
      userData[field] = val;
      inputArea.innerHTML = '';
      addUserMessage(val || 'Nothing specific');
      
      await sleep(400);
      
      const nextStepMap = {
        name: 'role',
        role: 'city',
        city: 'topics',
        specific_flags: 'phone',
        phone: 'email',
        email: 'time'
      };
      
      runStep(nextStepMap[field]);
    };

    window.toggleTopic = (el, topic) => {
      el.classList.toggle('selected');
      if (userData.topics.includes(topic)) {
        userData.topics = userData.topics.filter(t => t !== topic);
      } else {
        userData.topics.push(topic);
      }
      
      const btn = document.getElementById('topics-btn');
      btn.style.display = userData.topics.length > 0 ? 'block' : 'none';
    };

    window.submitTopics = async () => {
      if (userData.topics.length === 0) return;
      inputArea.innerHTML = '';
      addUserMessage(userData.topics.join(', '));
      await sleep(400);
      runStep('specific');
    };

    window.selectTime = async (displayTime, dbTime) => {
      userData.call_time = dbTime;
      inputArea.innerHTML = '';
      addUserMessage(displayTime);
      await sleep(400);
      runStep('submit');
    };

    async function submitData() {
      try {
        const payload = { ...userData };
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) console.error('Failed to submit');
      } catch (e) {
        console.error('Network error', e);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const progressContainer = document.querySelector('.progress-container');
      for (let i = 0; i < 10; i++) {
        const seg = document.createElement('div');
        seg.className = 'progress-segment';
        progressContainer.appendChild(seg);
      }
      
      setTimeout(() => runStep('intro'), 400);
    });

    async function typeText(el, text, speed) {
      el.textContent = '';
      for(let i=0; i<text.length; i++) {
        el.textContent += text[i];
        await sleep(speed + Math.random() * 20);
      }
    }

    async function startFinale() {
      try {
        const isMobile = window.innerWidth < 480;
        const userName = (userData.name || '').replace(/\\/g, '');
        const userCallTime = formatDisplayTime(userData.call_time);
        
        // Create overlay
        const overlay = document.createElement('div');
        overlay.className = 'finale-overlay';
        document.body.appendChild(overlay);
        
        // Collect sparks data
        const infoSparks = [
          userName,
          userData.role,
          userData.city,
          ...(userData.topics || []),
          userData.specific_flags,
          userCallTime
        ].filter(Boolean);

        // Create sparks
        const sparkEls = [];
        infoSparks.forEach((text, i) => {
          const spark = document.createElement('span');
          spark.className = 'info-spark';
          spark.textContent = text;
          const tx = (Math.random() - 0.5) * 800;
          const ty = (Math.random() - 0.5) * 600;
          spark.style.setProperty('--tx', `${tx}px`);
          spark.style.setProperty('--ty', `${ty}px`);
          spark.style.animationDelay = `${i * 100}ms`;
          overlay.appendChild(spark);
          sparkEls.push(spark);
        });

        // Add extra plain particle dots for density
        const dotCount = isMobile ? 15 : 30;
        for(let i=0; i<dotCount; i++) {
          const dot = document.createElement('span');
          dot.className = 'info-spark';
          dot.style.width = '4px'; dot.style.height = '4px';
          dot.style.background = '#F5A623'; dot.style.borderRadius = '50%';
          const tx = (Math.random() - 0.5) * 800;
          const ty = (Math.random() - 0.5) * 600;
          dot.style.setProperty('--tx', `${tx}px`);
          dot.style.setProperty('--ty', `${ty}px`);
          dot.style.animationDelay = `${Math.random() * 1000}ms`;
          overlay.appendChild(dot);
          sparkEls.push(dot);
        }

        // Agent Elements
        const orbContainer = document.createElement('div');
        orbContainer.className = 'orb-container';
        
        // Sonar Rings
        for(let i=0; i<3; i++) {
          const ring = document.createElement('div');
          ring.className = 'sonar-ring';
          orbContainer.appendChild(ring);
        }
        
        // Central Orb
        const orb = document.createElement('div');
        orb.className = 'central-orb';
        orbContainer.appendChild(orb);
        
        // Orbiting dots
        const orbitDots = [];
        for(let i=0; i<5; i++) {
          const d = document.createElement('div');
          d.className = 'orbiting-dot';
          d.style.setProperty('--dist', `${50 + Math.random() * 40}px`);
          d.style.setProperty('--dur', `${3 + Math.random() * 5}s`);
          d.style.setProperty('--op', `${0.4 + Math.random() * 0.4}`);
          orbContainer.appendChild(d);
          orbitDots.push(d);
        }
        overlay.appendChild(orbContainer);

        // Text Container
        const textArea = document.createElement('div');
        textArea.className = 'finale-text-area';
        
        const label = document.createElement('div');
        label.className = 'finale-label';
        label.textContent = `${userName}'s Morning Brief`;
        textArea.appendChild(label);
        
        const line1El = document.createElement('p'); line1El.className = 'typewriter-line line-1';
        const line2El = document.createElement('p'); line2El.className = 'typewriter-line';
        const line3El = document.createElement('p'); line3El.className = 'typewriter-line';
        textArea.appendChild(line1El);
        textArea.appendChild(line2El);
        textArea.appendChild(line3El);
        
        const cta = document.createElement('div');
        cta.className = 'finale-cta';
        cta.innerHTML = `
          <button class="share-btn">Share with a friend</button>
          <a href="#" class="linkedin-link">Follow the journey on LinkedIn &rarr;</a>
        `;
        textArea.appendChild(cta);
        
        overlay.appendChild(textArea);

        // Trigger overlay show and start Phase 1
        overlay.classList.add('visible');
        
        // Fade out chat container
        const mainCont = document.querySelector('.main-container');
        mainCont.style.transition = 'opacity 1s';
        mainCont.style.opacity = '0';
        
        // Phase 1: Information Sparks (0s - 2.5s)
        sparkEls.forEach(s => s.classList.add('explode'));

        // Phase 2: Convergence (2.5s - 4.5s)
        setTimeout(() => {
          sparkEls.forEach(s => {
            s.classList.remove('explode');
            s.style.animationDelay = '0s'; // reset delay
            void s.offsetWidth; // force reflow
            s.classList.add('converge');
          });
          
          // Orb appears at 4.0s (1.5s after 2.5s)
          setTimeout(() => {
            orb.classList.add('appear');
          }, 1500);
        }, 2500);

        // Phase 3: The Agent Awakens (4.5s - 6s)
        setTimeout(() => {
          // Start rings
          const rings = orbContainer.querySelectorAll('.sonar-ring');
          rings.forEach(r => r.classList.add('active'));
          
          // Start orbit dots
          orbitDots.forEach(d => d.classList.add('active'));
          
          // Fade in label
          label.style.opacity = '1';
        }, 4500);

        // Phase 4: Typewriter (6s)
        setTimeout(async () => {
          const line1 = "I am your personal AI agent.";
          const line2 = `I will call you every morning at ${userCallTime}.`;
          const line3 = `See you tomorrow, ${userName}. 🌅`;

          async function typewriterEffect(element, text, speed = 35) {
            for (let i = 0; i < text.length; i++) {
              element.textContent += text[i];
              await new Promise(r => setTimeout(r, speed));
            }
          }

          await typewriterEffect(line1El, line1);
          await new Promise(r => setTimeout(r, 800));
          await typewriterEffect(line2El, line2);
          await new Promise(r => setTimeout(r, 800));
          await typewriterEffect(line3El, line3);

          // Phase 5: Idle + CTA
          setTimeout(() => {
            cta.classList.add('visible');
            sparkEls.forEach(s => s.remove()); // cleanup sparks
          }, 2000);
        }, 6000);

      } catch (err) {
        console.error('Finale error:', err);
        const userName = (userData.name || '').replace(/\\/g, '');
        const selectedTime = formatDisplayTime(userData.call_time);
        document.body.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0A0A0A;color:#F3F3F3;font-family:'DM Sans',sans-serif;text-align:center;padding:20px;">
            <div style="width:80px;height:80px;border-radius:50%;background:#F5A623;margin-bottom:30px;animation:pulse 2s ease-in-out infinite;"></div>
            <h1 style="font-size:24px;margin-bottom:12px;">You're all set, ${userName}!</h1>
            <p style="font-size:18px;opacity:0.7;">I'll call you every morning at ${selectedTime}.</p>
            <p style="font-size:18px;opacity:0.7;margin-top:8px;">See you tomorrow. 🌅</p>
          </div>
          <style>@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 20px #F5A623}50%{transform:scale(1.05);box-shadow:0 0 40px #F5A623}}</style>
        `;
      }
    }

    // Handle mobile keyboard scroll issues
    document.addEventListener('focus', (e) => {
      if(e.target.tagName === 'INPUT') {
        setTimeout(scrollToBottom, 300);
      }
    }, true);
  </script>
</body>
</html>
